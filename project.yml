name: LocalDrop
options:
  bundleIdPrefix: com.localdrop
  deploymentTarget:
    macOS: "14.0"
packages:
  LocalSendKit:
    path: Modules/LocalSendKit
  DesignSystem:
    path: Modules/DesignSystem
  FeatureTransfer:
    path: Modules/FeatureTransfer
targets:
  LocalDrop:
    type: application
    platform: macOS
    sources:
      - path: App/LocalDropApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localdrop.LocalDrop
        INFOPLIST_FILE: App/LocalDropApp/Info.plist
        ENABLE_HARDENED_RUNTIME: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: FeatureTransfer
  LocalDropAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/LocalDropAppTests
    dependencies:
      - target: LocalDrop
  LocalDropAppUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/LocalDropAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localdrop.LocalDropUITests
        TEST_TARGET_NAME: LocalDrop
    dependencies:
      - target: LocalDrop
schemes:
  LocalDrop:
    build:
      targets:
        LocalDrop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LocalDropAppTests
        - LocalDropAppUITests
